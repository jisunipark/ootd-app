<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>로그인</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}"> 
        <link rel="stylesheet" href="{{ url_for('static', filename='css/join.css') }}">
    </head>
    <body>
        <nav>
            <div class="logo">
                <a href="/">로고</a>
            </div>
            <div class="nav-buttons">
                <a href="/auth/join">회원가입</a>
                <a href="/auth/login">로그인</a>
            </div>
        </nav>
    

    <div class="container">
        <h1>로그인</h1>
        <form action="{{ url_for('auth.login') }}" method="POST">
            <div class="form-group">
                <label for="username">아이디</label>
                <input type="text" id="username" name="username" required minlength="7" maxlength="20">
            </div>

            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" required minlength="7" maxlength="20">
            </div>

            <div class="button-group">
                <button type="submit" class="submit-btn">로그인</button>
                <a href="/auth/join" class="login-btn">회원가입</a>
            </div>
        </form>

        <div id="errorMessages"></div>
    </div>

    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>회원가입</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}"> 
        <link rel="stylesheet" href="{{ url_for('static', filename='css/join.css') }}">
    </head>

    <body>
        <!-- 네비게이션 바 -->
        <nav>
            <div class="logo">
                <a href="/">로고</a>
            </div>
            <div class="nav-buttons">
                <a href="/auth/join">회원가입</a>
                <a href="/auth/login">로그인</a>
            </div>
        </nav>
    
        <!-- 회원가입 폼 -->
        <div class="container">
            <h1>회원가입</h1>
            <form action="{{ url_for('auth.join') }}" method="POST">
                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" name="name" required minlength="2" maxlength="7" placeholder="2자~7자 입력">
                </div>

                <div class="form-group">
                    <label for="nickname">닉네임</label>
                    <input type="text" id="nickname" name="nickname" required minlength="2" maxlength="10" placeholder="2자~10자 입력">
                </div>

                <div class="form-group">
                    <label for="username">아이디</label>
                    <input type="text" id="username" name="username" required minlength="7" maxlength="20" placeholder="7자~20자 입력">
                </div>

                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" required minlength="7" maxlength="20" placeholder="7자~20자 입력">
                </div>

                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" required placeholder="이메일 형식">
                </div>

                <div class="radio-group">
                    <label><input type="radio" name="gender" value="male"> 남</label>
                    <label><input type="radio" name="gender" value="female"> 여</label>
                </div>
                
                <div class="button-group">
                    <button type="submit" class="submit-btn">회원가입</button>
                </div>
                <div class="login-link">
                    이미 회원이신가요? <a href="/auth/login">로그인</a>
                </div>
            </form>
        </div>

        <!-- JavaScript: 회원가입 후 알림 & 리다이렉트 -->
        <script>
            // 폼 제출 이벤트 처리
            document.querySelector('form').addEventListener('submit', async function(event) {
                event.preventDefault(); // 기본 제출 방지

                const form = event.target;
                const formData = new FormData(form);

                try {
                    const response = await fetch(form.action, {
                        method: form.method,
                        body: formData
                    });

                    const data = await response.json(); // JSON 응답 받기

                    if (response.ok) {
                        showMessage(data.message, "success");

                        // 1초 후 로그인 페이지로 이동
                        setTimeout(() => {
                            window.location.href = data.redirect;
                        }, 1000);
                    } else {
                        showMessage(data.message, "error");
                    }
                } catch (error) {
                    console.error("오류 발생:", error);
                    showMessage("서버 오류가 발생했습니다. 다시 시도해주세요.", "error");
                }
            });

            // 메시지를 표시하는 함수
            function showMessage(message, type = "success") {
                const messageDiv = document.createElement('div');
                messageDiv.textContent = message;
                messageDiv.style.position = 'fixed';
                messageDiv.style.top = '20px';
                messageDiv.style.left = '50%';
                messageDiv.style.transform = 'translateX(-50%)';
                messageDiv.style.padding = '15px 20px';
                messageDiv.style.color = 'white';
                messageDiv.style.fontSize = '18px';
                messageDiv.style.borderRadius = '8px';
                messageDiv.style.zIndex = '1000';
                messageDiv.style.boxShadow = '0 2px 8px rgba(0, 0, 0, 0.2)';
                messageDiv.style.backgroundColor = type === "success" ? '#4CAF50' : '#FF5733'; // 초록: 성공, 빨강: 오류
                document.body.appendChild(messageDiv);

                // 1초 후 메시지 자동 제거
                setTimeout(() => {
                    messageDiv.remove();
                }, 1000);
            }
        </script>
    </body>
</html>
